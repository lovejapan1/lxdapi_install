name: Rebuild packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/rebuild-packages.yml

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild patched packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/original
          upstream_owner=$(printf '\x78\x6b\x61\x74\x6c\x64')
          for arch in amd64 arm64; do
            curl -LfsS "https://github.com/${upstream_owner}/lxdapi-web-server/releases/download/v2.1.2/lxdapi-linux-${arch}.tar.gz" -o "build/original/lxdapi-linux-${arch}.tar.gz"
          done
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');

          const jobs = ['amd64', 'arm64'].map((arch) => ({
            input: `build/original/lxdapi-linux-${arch}.tar.gz`,
            output: `lxdapi-linux-${arch}.tar.gz`,
          }));

          function paddedUtf8(text, length) {
            const raw = Buffer.from(text, 'utf8');
            if (raw.length > length) throw new Error(`${text} is longer than ${length} bytes`);
            return Buffer.concat([raw, Buffer.alloc(length - raw.length, 0x20)]);
          }

          // Keep API routes untouched for WHMCS compatibility.
          // Patch branding and visible Chinese UI labels only.
          const replacementSpecs = [
            ['https://github.com/xkatld/lxdapi-web-server', 'https://github.com/lovejapan1/lxdapi'],
            ['https://github.com/      /lxdapi-web-server', 'https://github.com/lovejapan1/lxdapi'],
            ['https://github.com/Sakura/lxdapi-web-server', 'https://github.com/lovejapan1/lxdapi'],
            ['Github-xkatld', 'Sakura'],
            ['github-xkatld', 'sakura'],
            ['xkatld', 'Sakura'],
            ['LXD容器管理系统', 'Sakura管理系统'],
            ['LXD API 容器管理平台', 'Sakura 管理平台'],
            ['LXD API       管理平台', 'Sakura 管理平台'],
            ['LXD API 管理平台', 'Sakura 管理平台'],
            ['LXD API - 容器控制', 'Sakura服务器控制'],
            ['LXD API - 管理后台', 'Sakura - 管理后台'],
            ['LXD API - 用户中心', 'Sakura - 用户中心'],
            ['LXD API 管理', 'Sakura 管理'],
            ['LXD API', 'Sakura '],
            ['Sakura  - 容器控制', 'Sakura服务器控制'],
            ['容器: {{.hostname}} | 镜像:', '服务器:{{.hostname}}|镜像:'],
            ['容器管理访问码', '服务器访问码'],
            ['容器访问码                 </label>', '服务器访问码              </label>'],
            ['placeholder="请输入容器访问码"', 'placeholder="请输入服务器码"'],
            ['容器访问码</p>', '服务器码</p>'],
            ['容器控制面板', '服务器面板'],
            ['输入访问码以查看容器详情', '输入访问码以查看服务器'],
            ['容器管理 - Sakura管理系统   ', '服务器管理 - Sakura系统      '],
            ['容器管理 - Sakura 管理', '服务器管理 - Sakura'],
            ['容器详情 - Sakura 管理', '服务器详情 - Sakura'],
            ['管理所有LXD容器', '管理所有服务器'],
            ['容器管理</p>                             <p', '服务器管理</p>                          <p'],
            ['容器管理                     </div>', '服务器管理                  </div>'],
            ['容器管理                 </a>', '服务器管理              </a>'],
            ['容器:</span>                         <input type="text" id="containerFilter" placeholder="输入容器名称"', '服务器:</span>                  <input type="text" id="containerFilter" placeholder="输入服务器名称"'],
            ['容器:</span>                     <input type="text" id="containerFilter" placeholder="输入容器名称"', '服务器:</span>              <input type="text" id="containerFilter" placeholder="输入服务器名称"'],
            ['容器登录</title>     {{if', '服务器登录</title>  {{if'],
            ['placeholder="容器登录" maxlength', 'placeholder="服务器" maxlength'],
            ["default:'容器登录'", "default:'服务器'"],
            ['容器名称', '服务器名'],
            ['容器名', '服务器'],
            ['容器控制', '服务器'],
            ['容器管理', '服务器'],
          ];

          const replacements = replacementSpecs.map(([from, to]) => {
            const fromBuf = Buffer.from(from, 'utf8');
            return { from: fromBuf, to: paddedUtf8(to, fromBuf.length), label: from };
          });

          const forbiddenSpecs = [
            'Github-xkatld',
            'github-xkatld',
            'xkatld',
            'https://github.com/xkatld/lxdapi-web-server',
            'https://github.com/      /lxdapi-web-server',
            'https://github.com/Sakura/lxdapi-web-server',
            'LXD容器管理系统',
            'LXD API 容器管理平台',
            'LXD API       管理平台',
            'LXD API 管理平台',
            'LXD API - 容器控制',
            'LXD API - 管理后台',
            'LXD API - 用户中心',
            'LXD API',
            '容器: {{.hostname}} | 镜像:',
            '容器管理访问码',
            '容器控制面板',
            '输入访问码以查看容器详情',
          ];
          const forbidden = forbiddenSpecs.map((s) => ({ label: s, bytes: Buffer.from(s, 'utf8') }));

          function trimNull(buf) {
            const i = buf.indexOf(0);
            return (i >= 0 ? buf.subarray(0, i) : buf).toString('utf8').trim();
          }

          function parseOct(buf) {
            const s = trimNull(buf).trim();
            return s ? parseInt(s, 8) : 0;
          }

          function replaceAll(buf, from, to) {
            let count = 0;
            for (let i = 0; i <= buf.length - from.length; i++) {
              let ok = true;
              for (let j = 0; j < from.length; j++) {
                if (buf[i + j] !== from[j]) {
                  ok = false;
                  break;
                }
              }
              if (ok) {
                to.copy(buf, i);
                count++;
                i += from.length - 1;
              }
            }
            return count;
          }

          for (const job of jobs) {
            const tar = zlib.gunzipSync(fs.readFileSync(job.input));
            const counts = new Map(replacements.map((r) => [r.label, 0]));
            let offset = 0;

            while (offset + 512 <= tar.length) {
              const header = tar.subarray(offset, offset + 512);
              offset += 512;
              if (header.every((b) => b === 0)) break;

              const size = parseOct(header.subarray(124, 136));
              const type = String.fromCharCode(header[156] || 48);
              if (type === '0' || type === '\0') {
                const body = tar.subarray(offset, offset + size);
                for (const r of replacements) {
                  counts.set(r.label, counts.get(r.label) + replaceAll(body, r.from, r.to));
                }
              }
              offset += Math.ceil(size / 512) * 512;
            }

            fs.writeFileSync(job.output, zlib.gzipSync(tar, { level: 9 }));
            const rebuilt = zlib.gunzipSync(fs.readFileSync(job.output));
            for (const item of forbidden) {
              if (rebuilt.indexOf(item.bytes) !== -1) {
                throw new Error(`${job.output} still contains ${item.label}`);
              }
            }
            if (rebuilt.indexOf(Buffer.from('Sakura', 'utf8')) === -1) {
              throw new Error(`${job.output} does not contain Sakura`);
            }
            if (rebuilt.indexOf(Buffer.from('服务器', 'utf8')) === -1) {
              throw new Error(`${job.output} does not contain server UI label`);
            }
            if (rebuilt.indexOf(Buffer.from('/api/system/containers', 'utf8')) === -1) {
              throw new Error(`${job.output} lost WHMCS container API route`);
            }

            console.log(`${job.output} rebuilt`);
            for (const [label, count] of counts) {
              if (count > 0) console.log(`  ${label}: ${count}`);
            }
          }
          NODE

      - name: Commit rebuilt packages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lxdapi-linux-amd64.tar.gz lxdapi-linux-arm64.tar.gz
          if git diff --cached --quiet; then
            echo "No package changes to commit"
          else
            git commit -m "Update Sakura server-label patched packages"
            git pull --rebase origin main
            git push
          fi
